<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Contato</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #a3a3a3, #757575);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 300px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .contato {
            margin: 15px 0;
            font-size: 18px;
        }

        a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            transition: 0.3s;
        }

        a:hover {
            color: #4facfe;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Contato</h1>

        <div class="contato">
            📧 <a>luanrodrigues7.contato@gmail.com</a>
        </div>

        <div class="contato">
            💼 <a href="https://www.linkedin.com/in/luan-assuncao-rodrigues-25750b352" target="_blank">
                LinkedIn
            </a>
        </div>

    </div>

</body>
</html>
